apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopflow-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/oderbel-DS/shopflow-gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
      exclude: root-app.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
